# CPU-only Compose: no NVIDIA GPU; builds from Dockerfile.cpu or pulls ghcr.io ... :latest-cpu.
# Usage: docker compose -f docker-compose.cpu.yaml up -d
#        docker compose -f docker-compose.cpu.yaml build
# Pre-built image is linux/amd64 only. On ARM hosts Docker runs it via emulation when platform is set (below).
# Override NOOBSCRIBE_IMAGE if needed. See DOCKER_README.md.
services:
  noobscribe-api:
    image: ${NOOBSCRIBE_IMAGE:-ghcr.io/meganoob1337/noobscribe:latest-cpu}
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: noobscribe-api
    ports:
      - "9765:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - FORCE_CPU=${FORCE_CPU:-1}
      - DEBUG=${DEBUG:-0}
      - ENABLE_DIARIZATION=${ENABLE_DIARIZATION:-true}
      - INCLUDE_DIARIZATION_IN_TEXT=${INCLUDE_DIARIZATION_IN_TEXT:-true}
      - MODEL_ID=${MODEL_ID:-nvidia/canary-1b-v2}
      - MODEL_PATH=${MODEL_PATH:-}
      - DIARIZATION_MODEL_PATH=${DIARIZATION_MODEL_PATH:-}
      - TEMPERATURE=${TEMPERATURE:-0.0}
      - CHUNK_DURATION=${CHUNK_DURATION:-10}
      - HUGGINGFACE_ACCESS_TOKEN=${HUGGINGFACE_TOKEN:-}
      - CHROMADB_PATH=/app/data/speakers
      - RECORDINGS_PATH=/app/data/recordings
      - DATABASE_URL=sqlite+aiosqlite:////app/data/noobscribe.db
    volumes:
      - ./huggingface:/root/.cache/huggingface
      - ./data:/app/data
    restart: unless-stopped
